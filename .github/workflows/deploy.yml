name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: aws-actions/setup-sam@v2

      - name: Generate requirements.txt
        run: uv export --no-dev --no-hashes --format requirements.txt > requirements.txt

      - name: SAM build
        run: sam build

      - name: Deploy
        run: |
          sam deploy --parameter-overrides \
            TavilyApiKey="${{ secrets.TAVILY_API_KEY }}" \
            OpenRouterApiKey="${{ secrets.OPENROUTER_API_KEY }}" \
            SesSender="${{ secrets.SES_SENDER }}" \
            SesRecipient="${{ secrets.SES_RECIPIENT }}"
